name: fitsnap_ai
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  provider: ^6.1.2
  auto_animated: ^3.2.0
  get: ^4.6.6
  get_storage: ^2.1.1
  dio: ^5.7.0
  rxdart: ^0.28.0
  intl: ^0.20.1
  get_it: ^8.0.3
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  dotlottie_loader: ^0.0.4
  lottie: ^3.1.2
  pinput: ^5.0.1
  dotted_border: ^2.1.0
  image_picker: ^1.1.2
  custom_navigation_bar: ^0.8.2
  font_awesome_flutter: ^10.8.0
  flutter_rating_bar: ^4.0.1
  flutter_carousel_widget: ^3.1.0
  flutter_svg: ^2.2.0
  gpt_markdown: ^1.1.2
  video_player: ^2.8.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner:
  flutter_gen_runner:
  flutter_lints: ^5.0.0

flutter_gen:
  output: lib/gen/
  line_length: 80

  # Optional
  integrations:
    flutter_svg: false
    rive: false
    lottie: false

  colors:
    inputs:
      - assets/color/colors.xml

    outputs:
      class_name: AppColors

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/lottie/
    - assets/images/
    - assets/fonts/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: Satoshi Variable
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Regular.ttf
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf

  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
